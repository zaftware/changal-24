<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Changal 24</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;background:#0b0f14;color:#e9eef5;max-width:680px;margin:0 auto;padding:0 14px 40px}
a{color:#7cc4ff;text-decoration:none}
a:hover{text-decoration:underline}

header{display:flex;align-items:center;justify-content:space-between;padding:18px 0 14px;border-bottom:1px solid #1d2633;margin-bottom:16px}
header h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
header .tg-link{font-size:13px;color:#90a0b5}

.card{border:1px solid #1d2633;border-radius:12px;padding:14px 16px;margin-bottom:10px;background:#111722}
.card-meta{font-size:12px;color:#90a0b5;margin-bottom:6px}
.card-title{font-size:15px;font-weight:600;margin-bottom:8px;line-height:1.35}
.card-lead{font-size:14px;color:#c8d6e5;margin-bottom:8px;font-style:italic}
.card-bullets{font-size:14px;line-height:1.6;color:#dde6f0}
.card-bullets div{padding:1px 0}
.card-footer{margin-top:10px;font-size:12px;color:#90a0b5}

/* admin */
#admin-toggle-bar{padding:10px 0;margin-bottom:4px;display:flex;align-items:center;gap:10px}
#admin-toggle-bar input{flex:1;background:#101521;color:#e9eef5;border:1px solid #1d2633;border-radius:8px;padding:8px 10px;font-size:13px}
#admin-toggle-bar button{background:#1a2535;color:#7cc4ff;border:1px solid #1d2633;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;white-space:nowrap}
#admin-toggle-bar button:hover{background:#1f2f45}

#admin-panel{display:none;margin-bottom:20px}
#admin-panel .section-title{font-size:13px;font-weight:600;color:#90a0b5;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}

.admin-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.admin-actions button,.action-btn{background:#101521;color:#e9eef5;border:1px solid #1d2633;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px}
.admin-actions button:hover,.action-btn:hover{background:#1a2535}
.action-btn.primary{color:#7cc4ff;border-color:#2a4060}
.action-btn.primary:hover{background:#162030}

#custom-text{width:100%;background:#101521;color:#e9eef5;border:1px solid #1d2633;border-radius:8px;padding:10px;font-size:13px;resize:vertical;margin-bottom:8px;font-family:inherit}
#status{font-size:12px;color:#90a0b5;min-height:18px;margin:6px 0 14px}

.pending-card{border:1px solid #1d2633;border-radius:10px;padding:12px 14px;margin-bottom:8px;background:#0d1520;display:flex;gap:12px;align-items:flex-start}
.pending-card .info{flex:1;min-width:0}
.pending-card .info .p-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.pending-card .info .p-meta{font-size:12px;color:#90a0b5}
.pending-card .pub-btn{flex-shrink:0;background:#162030;color:#7cc4ff;border:1px solid #2a4060;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:12px;white-space:nowrap}
.pending-card .pub-btn:hover{background:#1e3048}
.pending-card .pub-btn:disabled{opacity:.5;cursor:default}

#feed-title{font-size:13px;font-weight:600;color:#90a0b5;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
#list .empty{color:#90a0b5;font-size:14px;padding:20px 0}
</style>
</head>
<body>

<header>
  <h1>🦞 Changal 24</h1>
  <a class="tg-link" href="https://t.me/changal_24" target="_blank">Telegram →</a>
</header>

<!-- Admin toggle -->
<div id="admin-toggle-bar">
  <input id="token" type="password" placeholder="Admin token"/>
  <button onclick="showAdmin()">Admin panel</button>
</div>

<div id="admin-panel">
  <div class="section-title">Admin</div>

  <div class="admin-actions">
    <button class="action-btn primary" onclick="publishNow()">Publish top post</button>
    <button class="action-btn" onclick="loadPending()">Refresh queue</button>
  </div>

  <textarea id="custom-text" rows="3" placeholder="Kanalga custom post matni..."></textarea>
  <button class="action-btn" onclick="postCustom()">Post custom</button>

  <div id="status"></div>

  <div class="section-title" style="margin-top:4px">Pending queue</div>
  <div id="pending-list"><div class="empty">Yuklanmoqda...</div></div>
</div>

<!-- Public feed -->
<div id="feed-title">So'nggi yangiliklar</div>
<div id="list"><div class="empty">Yuklanmoqda...</div></div>

<script>
const SOURCE_MAP = {
  'reddit.com':'Reddit','news.ycombinator.com':'Hacker News','github.com':'GitHub',
  'lesswrong.com':'LessWrong','x.com':'X','twitter.com':'X','youtube.com':'YouTube',
  'youtu.be':'YouTube','arxiv.org':'arXiv','openai.com':'OpenAI','anthropic.com':'Anthropic',
  'robservatory.com':'Robservatory','windowslatest.com':'Windows Latest',
  'replicate.com':'Replicate','take.surf':'take.surf','ntik.me':'Nick Tikhonov',
};

function sourceName(url) {
  try {
    const host = new URL(url).hostname.replace(/^www\./, '');
    if (SOURCE_MAP[host]) return SOURCE_MAP[host];
    const parts = host.split('.');
    const base = parts.length >= 2 ? parts.at(-2) : host;
    return base.split(/[-._]+/).map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' ');
  } catch { return 'Manba'; }
}

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return isNaN(d) ? '' : d.toLocaleDateString('ru', {day:'2-digit',month:'short',year:'numeric'});
}

function renderTldr(raw) {
  if (!raw) return '<span style="color:#90a0b5;font-style:italic">TL;DR yo\'q</span>';
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const lead = lines[0].startsWith('– ') ? null : lines[0];
  const bullets = lines.filter(l => l.startsWith('– '));
  let html = '';
  if (lead) html += `<div class="card-lead">${esc(lead)}</div>`;
  if (bullets.length) html += `<div class="card-bullets">${bullets.map(l => `<div>${esc(l)}</div>`).join('')}</div>`;
  return html || `<div class="card-bullets">${lines.map(l=>`<div>${esc(l)}</div>`).join('')}</div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function adminHeaders() {
  return {'content-type':'application/json','x-admin-token': document.getElementById('token').value.trim()};
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// Feed
fetch('/api/news').then(r => r.json()).then(rows => {
  const el = document.getElementById('list');
  if (!rows.length) { el.innerHTML = '<div class="empty">Hozircha yangiliklar yo\'q</div>'; return; }
  el.innerHTML = rows.map(x => {
    const src = sourceName(x.url || x.source_url || '');
    const date = fmtDate(x.published_at);
    const title = esc(x.title_uz || x.title || '');
    return `<div class="card">
      <div class="card-meta">${esc(src)}${date ? ' · ' + date : ''}</div>
      <div class="card-title"><a href="${esc(x.url)}" target="_blank">${title}</a></div>
      ${renderTldr(x.tldr_uz)}
      <div class="card-footer"><a href="/news/${x.id}">Batafsil</a></div>
    </div>`;
  }).join('');
}).catch(() => {
  document.getElementById('list').innerHTML = '<div class="empty">Xato: yangiliklar yuklanmadi</div>';
});

// Admin
async function showAdmin() {
  const r = await fetch('/api/admin/pending', { headers: adminHeaders() });
  if (r.status === 401) { setStatus('Noto\'g\'ri token'); return; }
  if (!r.ok) { setStatus('Xato ' + r.status); return; }
  document.getElementById('admin-panel').style.display = 'block';
  renderPending(await r.json());
}

async function loadPending() {
  const r = await fetch('/api/admin/pending', { headers: adminHeaders() });
  if (!r.ok) return;
  renderPending(await r.json());
}

function renderPending(rows) {
  const el = document.getElementById('pending-list');
  if (!rows.length) { el.innerHTML = '<div class="empty">Navbat bo\'sh</div>'; return; }
  el.innerHTML = rows.map(x => {
    const src = sourceName(x.url || x.source_url || '');
    return `<div class="pending-card" id="pc-${x.id}">
      <div class="info">
        <div class="p-title" title="${esc(x.title || '')}">${esc(x.title || '')}</div>
        <div class="p-meta">${esc(src)} · score ${Math.round(x.score || 0)}</div>
      </div>
      <button class="pub-btn" onclick="publishPost(${x.id}, this)">Publish</button>
    </div>`;
  }).join('');
}

async function publishPost(id, btn) {
  btn.disabled = true;
  btn.textContent = '...';
  setStatus('Publishing #' + id + '...');
  const r = await fetch('/api/publish-post', { method:'POST', headers: adminHeaders(), body: JSON.stringify({id}) });
  const j = await r.json().catch(() => ({}));
  if (r.ok) {
    setStatus('OK: ' + (j.output || 'published'));
    document.getElementById('pc-' + id)?.remove();
  } else {
    setStatus('ERR: ' + (j.error || r.status));
    btn.disabled = false;
    btn.textContent = 'Publish';
  }
}

async function publishNow() {
  setStatus('Publishing...');
  const r = await fetch('/api/publish-now', { method:'POST', headers: adminHeaders() });
  const j = await r.json().catch(() => ({}));
  setStatus(r.ok ? 'OK: ' + (j.output || 'published') : 'ERR: ' + (j.error || r.status));
  if (r.ok) loadPending();
}

async function postCustom() {
  const text = document.getElementById('custom-text').value.trim();
  if (!text) return;
  setStatus('Sending...');
  const r = await fetch('/api/post-custom', { method:'POST', headers: adminHeaders(), body: JSON.stringify({text}) });
  const j = await r.json().catch(() => ({}));
  setStatus(r.ok ? 'OK: sent' : 'ERR: ' + (j.error || r.status));
}
</script>
</body>
</html>
